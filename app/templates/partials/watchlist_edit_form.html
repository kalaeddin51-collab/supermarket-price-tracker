<div id="watchlist-row-{{ entry.id }}" class="bg-emerald-50 rounded-2xl border border-emerald-200 shadow-sm p-4">
  <form
    hx-put="/partials/watchlist/{{ entry.id }}"
    hx-target="#watchlist-row-{{ entry.id }}"
    hx-swap="outerHTML"
    class="space-y-3"
  >
    <!-- Product name (read-only) -->
    <div class="font-semibold text-sm text-gray-800">{{ product.name }}</div>

    <div class="flex flex-wrap gap-4">
      <!-- Alert: price drop % -->
      <div>
        <label class="block text-xs text-gray-500 mb-1 font-medium">Alert on drop %</label>
        <div class="relative">
          <input type="number" name="alert_drop_pct" min="1" max="99" step="1"
            value="{{ entry.alert_drop_pct or '' }}"
            placeholder="e.g. 10"
            class="w-24 border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 pr-6">
          <span class="absolute right-2 top-2 text-xs text-gray-400">%</span>
        </div>
      </div>

      <!-- Alert: price below $ -->
      <div>
        <label class="block text-xs text-gray-500 mb-1 font-medium">Alert when below</label>
        <div class="relative">
          <span class="absolute left-2.5 top-2 text-xs text-gray-400">$</span>
          <input type="number" name="alert_price_below" min="0.01" step="0.01"
            value="{{ entry.alert_price_below or '' }}"
            placeholder="e.g. 3.50"
            class="w-28 border border-gray-300 rounded-lg px-3 py-1.5 pl-6 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>
      </div>

      <!-- Notify channels -->
      <div>
        <label class="block text-xs text-gray-500 mb-1 font-medium">Notify via</label>
        <div class="flex gap-3">
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="checkbox" name="notify_email" value="on"
              {% if entry.notify_email %}checked{% endif %}
              class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
            Email
          </label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="checkbox" name="notify_push" value="on"
              {% if entry.notify_push %}checked{% endif %}
              class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
            Push
          </label>
        </div>
      </div>
    </div>

    <div class="flex gap-2">
      <button type="submit"
        class="text-sm bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-lg transition-colors font-semibold">
        Save
      </button>
      <!-- Cancel: re-fetch the watchlist page -->
      <button type="button"
        hx-get="/watchlist"
        hx-target="body"
        hx-push-url="true"
        class="text-sm border border-gray-300 text-gray-600 hover:bg-gray-100 px-4 py-1.5 rounded-lg transition-colors">
        Cancel
      </button>
    </div>
  </form>
</div>
